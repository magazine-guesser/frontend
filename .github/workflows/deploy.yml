name: Deploy

on:
  push:
    branches: 
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::464108382357:role/InfraStack-GithubOicdFrontendRoleBF84A30E-iklD6Ed787LI
          aws-region: eu-central-1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
      
      - name: Sync to S3
        run: aws s3 sync dist/ s3://infrastack-frontendbucketefe2e19c-6y6aeuptkbkf --delete

      # TODO: cloudfront stuff here