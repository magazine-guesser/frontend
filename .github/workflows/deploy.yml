name: Deploy

on:
  push:
    branches: 
      - main

permissions:
  id-token: write
  contents: read

env:
  VITE_API_URL: ${{ vars.VITE_API_URL }}

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/mg-github-frontend
          aws-region: eu-central-1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
      
      - name: Sync to S3
        run: aws s3 sync dist/ s3://infrastack-frontendbucketefe2e19c-6y6aeuptkbkf --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E2GOR6A91J343X --paths "/*"